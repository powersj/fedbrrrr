name: Update Indicator Data

on:
  schedule:
    # Run at 6 AM UTC on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run data update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run python -m backend.main

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/ data/indicators.db
          git diff --staged --quiet || git commit -m "Update indicator data [automated]"
          git push
